<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binnenkort Beschikbaar | VIP Fotografie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        .coming-soon-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
        }

        .coming-soon-content {
            z-index: 2;
            max-width: 600px;
        }

        .coming-soon-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .coming-soon-content p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .coming-soon-logo {
            margin-bottom: 50px;
        }

        .coming-soon-footer {
            margin-top: 50px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            width: 100%;
        }

        .coming-soon-contact {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .coming-soon-contact p {
            margin-bottom: 0;
            font-size: 1rem;
        }

        .coming-soon-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: url('assets/images/natuur-4.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            }
        })();
    </script>

    <main class="coming-soon-hero">
        <div class="coming-soon-bg"></div>
        
        <div class="coming-soon-content container fade-in visible">
            <div class="coming-soon-logo">
                <svg width="280" height="80" viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="40" cy="40" r="35" fill="#a66b92" />
                    <circle cx="56" cy="32" r="12" fill="#b2b296" opacity="0.9" />
                    <text x="90" y="38" font-family="'Playfair Display', serif" font-size="28" font-weight="700" fill="#a66b92" style="text-transform: lowercase;">vip fotografie</text>
                    <text x="90" y="62" font-family="'Lato', sans-serif" font-size="13" font-weight="400" fill="#b2b296" letter-spacing="3">PAUL VAN IMPE</text>
                </svg>
            </div>

            <h1>Binnenkort online</h1>
            <p>We leggen momenteel de laatste hand aan onze nieuwe website. Binnenkort ontdekt u hier onze volledige portfolio.</p>
            
            <div class="coming-soon-footer">
                <div class="coming-soon-contact">
                    <p><span class="icon">📞</span> 0473 63.29.48</p>
                    <p><span class="icon">✉️</span> <a href="mailto:foto.vip@skynet.be" style="color: inherit; text-decoration: none;">foto.vip@skynet.be</a></p>
                </div>
                <p style="margin-top: 30px; font-size: 0.9rem;">&copy; <span id="year"></span> VIP Fotografie Paul Van Impe</p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
