<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evenementen | VIP Fotografie</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-detail-page">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            }
        })();
    </script>
    <header>
        <nav class="container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <svg width="280" height="80" viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg">
                        <!-- Main Purple Circle -->
                        <circle cx="40" cy="40" r="35" fill="#a66b92" />
                        <circle cx="56" cy="32" r="12" fill="#b2b296" opacity="0.9" />
                        
                        <!-- Text Group -->
                        <text x="90" y="38" font-family="'Playfair Display', serif" font-size="28" font-weight="700" fill="#a66b92" style="text-transform: lowercase;">vip fotografie</text>
                        <text x="90" y="62" font-family="'Lato', sans-serif" font-size="13" font-weight="400" fill="#b2b296" letter-spacing="3">PAUL VAN IMPE</text>
                    </svg>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#portfolio">Terug naar Portfolio</a></li>
                <li><button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">🌓</button></li>
            </ul>
        </nav>
    </header>

    <main class="container fade-in visible">
        <section class="portfolio-header">
            <div class="section-title">
                <span>Gallerij</span>
                <h2>Evenementen</h2>
            </div>
        </section>

        <div class="gallery-grid">
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-1.jpg" alt="Evenement 1"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-2.jpg" alt="Evenement 2"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-3.jpg" alt="Evenement 3"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-4.jpg" alt="Evenement 4"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-5.jpg" alt="Evenement 5"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-6.jpg" alt="Evenement 6"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-7.jpg" alt="Evenement 7"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-8.jpg" alt="Evenement 8"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-9.jpg" alt="Evenement 9"></div>
            <div class="gallery-item lightbox-trigger"><img src="assets/images/evenementen-10.jpg" alt="Evenement 10"></div>
        </div>
        
        <div class="back-link">
            <a href="index.html#portfolio" class="btn">Alle Categorieën</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 VIP Fotografie Paul Van Impe. Alle rechten voorbehouden.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
